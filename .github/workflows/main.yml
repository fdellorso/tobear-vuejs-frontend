name: Build and Deploy Vue App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Copy prod manifest
        run: cp public/prod_x10.manifest.webmanifest public/manifest.webmanifest

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api
          VITE_BASE_URL: /app/
          VITE_MATOMO_HOST: ${{ secrets.VITE_MATOMO_HOST }}
          VITE_MATOMO_SITE_ID: ${{ secrets.VITE_MATOMO_SITE_ID }}
          VITE_AUTH_ENABLED: false

      - name: Run E2E tests on production build
        run: npm run test:e2e:pwa

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_FOLDER }}
          exclude: |
            **/.git*
            **/.git*/**

      - name: Deploy summary
        run: |
          echo "### ✅ Frontend deploy completato" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Autore**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ora**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
