name: Build and Deploy Vue App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Copy prod manifest
        run: cp public/prod_x10.manifest.webmanifest public/manifest.webmanifest

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_MATOMO_HOST: ${{ secrets.VITE_MATOMO_HOST }}
          VITE_MATOMO_SITE_ID: ${{ secrets.VITE_MATOMO_SITE_ID }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ftp_server_x10 }}
          username: ${{ secrets.ftp_username_x10 }}
          password: ${{ secrets.ftp_password_x10 }}
          local-dir: dist/
          server-dir: ${{ secrets.ftp_folder_x10 }}
          exclude: |
            **/.git*
            **/.git*/**

      - name: Deploy summary
        run: |
          echo "### ✅ Deploy completato" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Autore**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ora**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
